<svg width="200" height="200" viewBox="13 13 94 94" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <defs>
    <clipPath id="cookie-clip-right" clipPathUnits="userSpaceOnUse">
      <path d="M104 14 L121 14 L121 121 L14 121 L14 106 Z"/>
    </clipPath>
    <clipPath id="cookie-clip-left" clipPathUnits="userSpaceOnUse">
      <path d="M14 106 L14 -1 L121 -1 L106 14 Z"/>
    </clipPath>
  </defs>

  <!-- Cookie (remplace le camembert) -->
  <g clip-path="url(#cookie-clip-left)">
    <circle fill="#dccaf8" cx="60" cy="60" r="40"/>
    <!-- Pépites de chocolat -->
    <ellipse fill="#8B5CF6" cx="42" cy="35" rx="5"   ry="3.5" transform="rotate(-15 42 35)"/>
    <ellipse fill="#3B82F6" cx="67" cy="30" rx="4"   ry="5.5" transform="rotate(10 67 30)"/>
    <ellipse fill="#8B5CF6" cx="28" cy="58" rx="5.5" ry="3.5" transform="rotate(-8 28 58)"/>
    <ellipse fill="#3B82F6" cx="53" cy="44" rx="3.5" ry="4.5" transform="rotate(15 53 44)"/>
    <ellipse fill="#8B5CF6" cx="73" cy="37" rx="4.5" ry="3"   transform="rotate(-5 73 37)"/>
    <ellipse fill="#3B82F6" cx="36" cy="76" rx="4"   ry="5"   transform="rotate(-20 36 76)"/>
    <ellipse fill="#8B5CF6" cx="57" cy="60" rx="4"   ry="3"   transform="rotate(10 57 60)"/>
    <ellipse fill="#3B82F6" cx="45" cy="52" rx="3"   ry="4"   transform="rotate(5 45 52)"/>
  </g>

  <!-- Barres diagonales -->
  <g clip-path="url(#cookie-clip-right)">
    <rect fill="#3B82F6" x="30" y="69" width="12" height="24" transform="rotate(-45 38 81)"/>
    <rect fill="#8B5CF6" x="46" y="43" width="12" height="48" transform="rotate(-45 54 67)"/>
    <rect fill="#3B82F6" x="62" y="9"  width="12" height="88" transform="rotate(-45 70 53)"/>
    <rect fill="#8B5CF6" x="80" y="25" width="12" height="24" transform="rotate(-45 86 39)"/>
  </g>

  <!-- Ligne de séparation -->
  <line stroke="#955ae0" stroke-width="2.8" stroke-linecap="round" x1="15" y1="105" x2="105" y2="15"/>
</svg>
