<svg width="200" height="200" viewBox="13 13 94 94" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <defs>
    <linearGradient id="studioGrad" x1="13" y1="107" x2="107" y2="13" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>

    <clipPath id="studio-round" clipPathUnits="userSpaceOnUse">
      <rect x="13" y="13" width="94" height="94" rx="20"/>
