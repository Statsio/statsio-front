    <clipPath id="studio-clip-right" clipPathUnits="userSpaceOnUse">
      <path d="M104 14 L121 14 L121 121 L14 121 L14 106 Z"/>
    </clipPath>

    <clipPath id="studio-clip-left" clipPathUnits="userSpaceOnUse">
      <path d="M14 106 L14 -1 L121 -1 L106 14 Z"/>
