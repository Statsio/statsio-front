services:
  nuxt-app:
    build: .
    container_name: statsio-front
    ports:
      - "3000:3000"
    env_file:
      - path: .env.local
        required: false
    environment:
      - NUXT_PUBLIC_API_BASE_URL=http://localhost:8080/api
      - NUXT_PUBLIC_AUTH_API_BASE_URL=http://localhost:8080/api/auth
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
