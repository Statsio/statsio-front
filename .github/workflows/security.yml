name: Security

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [main, staging]
  schedule:
    - cron: '17 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  secrets:
    name: Gitleaks (secret scanning)
    runs-on: ubuntu-latest
    container:
      image: zricethezav/gitleaks:latest
      options: --entrypoint ""

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Gitleaks scan
        run: gitleaks detect --source . --verbose

  sast:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Semgrep scan
        run: |
          semgrep scan \
            --config p/security-audit \
            --config p/typescript \
            --config p/javascript \
            --config p/secrets \
            --severity ERROR \
            --error \
            --sarif --output semgrep.sarif

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif

  dependency-audit:
    name: npm audit (SCA)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high

  docker-scan:
    name: Trivy (Dockerfile + image)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Trivy config scan (Dockerfile misconfig)
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: ./Dockerfile
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Build image for scanning
        continue-on-error: true
        run: docker build -t statsio-front:ci-scan .

      - name: Trivy image scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: statsio-front:ci-scan
          format: sarif
          output: trivy-image.sarif
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: Check SARIF exists
        id: sarif_check
        if: always()
        run: test -f trivy-image.sarif && echo "found=true" >> "$GITHUB_OUTPUT" || echo "found=false" >> "$GITHUB_OUTPUT"

      - name: Upload SARIF
        if: always() && steps.sarif_check.outputs.found == 'true'
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image.sarif
