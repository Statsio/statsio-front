name: Deploy Frontend

on:
  push:
    branches: [main, staging]

jobs:
  test:
    uses: ./.github/workflows/tests.yml

  deploy:
    name: Build & Deploy to Cloudflare (${{ github.ref_name }})
    needs: test
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'Production' || 'Staging' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check required variables
        run: |
          : "${NUXT_PUBLIC_API_BASE_URL:?Variable NUXT_PUBLIC_API_BASE_URL is empty — add it to the GitHub Production environment}"
          : "${NUXT_PUBLIC_GOOGLE_CLIENT_ID:?Variable NUXT_PUBLIC_GOOGLE_CLIENT_ID is empty — add it to the GitHub Production environment}"
        env:
          NUXT_PUBLIC_API_BASE_URL: ${{ vars.NUXT_PUBLIC_API_BASE_URL }}
          NUXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ vars.NUXT_PUBLIC_GOOGLE_CLIENT_ID }}

      - name: Create .env
        run: |
          echo "NUXT_PUBLIC_API_BASE_URL=${{ vars.NUXT_PUBLIC_API_BASE_URL }}" >> .env
          echo "NUXT_PUBLIC_GOOGLE_CLIENT_ID=${{ vars.NUXT_PUBLIC_GOOGLE_CLIENT_ID }}" >> .env
          echo "NUXT_PUBLIC_APP_ENV=${{ vars.NUXT_PUBLIC_APP_ENV }}" >> .env
          echo "NUXT_PUBLIC_PASSWORD_MIDDLEWARE=${{ secrets.NUXT_PUBLIC_PASSWORD_MIDDLEWARE }}" >> .env
          echo "NUXT_PUBLIC_COMING_SOON=${{ vars.NUXT_PUBLIC_COMING_SOON }}" >> .env

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Workers
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            npx wrangler deploy \
              --var "NUXT_PUBLIC_API_BASE_URL:$NUXT_PUBLIC_API_BASE_URL" \
              --var "NUXT_PUBLIC_GOOGLE_CLIENT_ID:$NUXT_PUBLIC_GOOGLE_CLIENT_ID"
          else
            npx wrangler deploy --env staging \
              --var "NUXT_PUBLIC_API_BASE_URL:$NUXT_PUBLIC_API_BASE_URL" \
              --var "NUXT_PUBLIC_GOOGLE_CLIENT_ID:$NUXT_PUBLIC_GOOGLE_CLIENT_ID"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NUXT_PUBLIC_API_BASE_URL: ${{ vars.NUXT_PUBLIC_API_BASE_URL }}
          NUXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ vars.NUXT_PUBLIC_GOOGLE_CLIENT_ID }}
