name: Deploy Frontend

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy to Cloudflare
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check required variables
        run: |
          : "${NUXT_PUBLIC_API_BASE_URL:?Variable NUXT_PUBLIC_API_BASE_URL is empty — add it to the GitHub Production environment}"
          : "${NUXT_PUBLIC_GOOGLE_CLIENT_ID:?Variable NUXT_PUBLIC_GOOGLE_CLIENT_ID is empty — add it to the GitHub Production environment}"
        env:
          NUXT_PUBLIC_API_BASE_URL: ${{ vars.NUXT_PUBLIC_API_BASE_URL }}
          NUXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ vars.NUXT_PUBLIC_GOOGLE_CLIENT_ID }}

      - name: Create .env
        run: |
          echo "NUXT_PUBLIC_API_BASE_URL=${{ vars.NUXT_PUBLIC_API_BASE_URL }}" >> .env
          echo "NUXT_PUBLIC_GOOGLE_CLIENT_ID=${{ vars.NUXT_PUBLIC_GOOGLE_CLIENT_ID }}" >> .env

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
