name: Tests Frontend

on:
  pull_request:
    branches: [main, staging]
  workflow_call:

jobs:
  lint:
    name: Lint (ESLint + Oxlint)
    runs-on: ubuntu-latest
    # Non-blocking for now: eslint . surfaces ~300+ pre-existing violations across
    # the codebase (unrelated to this workflow), tracked as separate follow-up work.
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint (check mode, no auto-fix)
        run: npm run lint:ci

  typecheck:
    name: Type check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run type-check

  unit:
    name: Vitest (unit + component)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:unit -- --run

  test:
    name: All checks passed
    needs: [lint, typecheck, unit]
    runs-on: ubuntu-latest

    steps:
      - name: OK
        run: echo "lint, typecheck and unit tests all passed"
