<svg width="200" height="200" viewBox="10 10 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <defs>
    <style>
      .blue-dark     { fill: #3B82F6; }
      .purple-medium { fill: #8B5CF6; }
      .purple-light  { fill: #dccaf8; }
      .diag-line     { stroke: #955ae0; stroke-width: 2.8; stroke-linecap: round; }
      .studio-handle { fill: #ffffff; stroke: #3B82F6; stroke-width: 1.2; }
      .studio-guide  { stroke: #cbd5e1; stroke-width: 0.4; stroke-dasharray: 2 2; }
    </style>

    <clipPath id="clip-right" clipPathUnits="userSpaceOnUse">
      <path d="M104 14 L121 14 L121 121 L14 121 L14 106 Z"/>
    </clipPath>

    <clipPath id="clip-left" clipPathUnits="userSpaceOnUse">
      <path d="M14 106 L14 -1 L121 -1 L106 14 Z"/>
    </clipPath>
  </defs>

  <!-- Guides / Grid lines (très discrets pour l'aspect Studio) -->
  <g class="studio-guide" opacity="0.4">
    <line x1="10" y1="60" x2="110" y2="60" />
    <line x1="60" y1="10" x2="60" y2="110" />
    <circle cx="60" cy="60" r="40" fill="none" />
    <rect x="20" y="20" width="80" height="80" fill="none" />
  </g>

  <!-- Camembert (très discret en fond pour le favicon) -->
  <g clip-path="url(#clip-left)" opacity="0.3">
    <circle class="purple-medium" cx="60" cy="60" r="40"/>
    <path class="purple-medium" d="M60 60 L20 60 A40 40 0 0 1 60 20 Z"/>
    <path class="purple-light" d="M60 60 L20 60 A40 40 0 0 0 60 100 Z"/>
    <path class="blue-dark" d="M60 60 L60 20 A40 40 0 0 1 93.5 35.5 Z"/>
  </g>

  <!-- Barres (très discrètes en fond pour le favicon) -->
  <g clip-path="url(#clip-right)" opacity="0.3">
    <rect class="blue-dark"     x="30" y="69" width="12" height="24" transform="rotate(-45 38 81)"/>
    <rect class="purple-medium" x="46" y="43" width="12" height="48" transform="rotate(-45 54 67)"/>
    <rect class="blue-dark"     x="62" y="9"  width="12" height="88" transform="rotate(-45 70 53)"/>
    <rect class="purple-medium" x="80" y="25" width="12" height="24" transform="rotate(-45 86 39)"/>
  </g>

  <!-- Crayon ÉPAISSI et plus contrasté pour la visibilité favicon -->
  <g transform="translate(25, 95) rotate(-45)">
    <!-- Corps du crayon (plus large: 12px de haut au lieu de 8) -->
    <rect x="0" y="-6" width="70" height="12" rx="2" class="purple-medium" />
    
    <!-- Mine/Pointe -->
    <path d="M70 -6 L90 0 L70 6 Z" class="purple-light" />
    <path d="M82 -2.5 L90 0 L82 2.5 Z" class="blue-dark" />
    
    <!-- Gomme/Arrière -->
    <rect x="-10" y="-6" width="12" height="12" rx="2.5" class="blue-dark" />
    
    <!-- Bague métallique -->
    <rect x="-2" y="-6" width="5" height="12" class="purple-light" />
  </g>

  <!-- Handles for "Studio" look -->
  <circle class="studio-handle" cx="20" cy="100" r="3.5"/>
  <circle class="studio-handle" cx="100" cy="20" r="3.5"/>
</svg>
